version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/aas-web-ui"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Etc/UTC"
    cooldown:
      default-days: 1
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
