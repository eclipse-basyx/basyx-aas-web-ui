name: Build and Push Docker Images on Release

on:
  release:
    types: [published]

concurrency:
  group: docker-release-ui-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        run: |
          if [[ "${GITHUB_REPOSITORY}" == "eclipse-basyx/basyx-aas-web-ui" && "${GITHUB_EVENT_REPOSITORY_FORK}" != "true" ]]; then
            echo "✅ Running in upstream repository"
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          else
            echo "⏭️ Skipping build — fork detected (${GITHUB_REPOSITORY})"
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push-release:
    needs: guard
    if: ${{ needs.guard.outputs.should-run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
    outputs:
      image_digest_ref: ${{ steps.refs.outputs.image_digest_ref }}
      version: ${{ steps.meta.outputs.version }}

    env:
      IMAGE_NAME: eclipsebasyx/aas-gui

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.4.1

      - name: Install Syft
        run: |
          set -euo pipefail
          SYFT_VERSION=1.29.1
          ARCHIVE="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl -fsSLO "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/${ARCHIVE}"
          curl -fsSLO "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_checksums.txt"
          curl -fsSLO "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_checksums.txt.sig"
          curl -fsSLO "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_checksums.txt.pem"

          cosign verify-blob \
            --certificate "syft_${SYFT_VERSION}_checksums.txt.pem" \
            --signature "syft_${SYFT_VERSION}_checksums.txt.sig" \
            --certificate-identity-regexp '^https://github\.com/anchore/syft/\.github/workflows/release\.ya?ml@refs/(heads/main|tags/v.*)$' \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "syft_${SYFT_VERSION}_checksums.txt"

          grep " ${ARCHIVE}$" "syft_${SYFT_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "${ARCHIVE}" syft
          sudo install -m 0755 syft /usr/local/bin/syft
          syft version

      - name: Extract Release Tag
        id: meta
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          TAGS="${IMAGE_NAME}:${VERSION},${IMAGE_NAME}:latest"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Building release version: ${VERSION}"
          echo "Docker tags: ${TAGS}"

      - name: Build and Push Docker Images
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./aas-web-ui
          file: ./aas-web-ui/Dockerfile
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            VITE_APP_VERSION=${{ steps.meta.outputs.version }}
            VITE_APP_COMMIT_SHA=${{ github.sha }}
            VITE_APP_BUILD_DATE=${{ github.event.release.published_at }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=BaSyx AAS Web UI
            org.opencontainers.image.description=Eclipse BaSyx Asset Administration Shell Web UI
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=Eclipse BaSyx
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/README.md
            org.opencontainers.image.created=${{ github.event.release.published_at }}

      - name: Compute image references
        id: refs
        run: |
          set -euo pipefail
          echo "image_digest_ref=${IMAGE_NAME}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Sign image digest (keyless)
        env:
          IMAGE_DIGEST_REF: ${{ steps.refs.outputs.image_digest_ref }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE_DIGEST_REF}"

      - name: Extract BuildKit provenance and SBOM predicates
        env:
          IMAGE_DIGEST_REF: ${{ steps.refs.outputs.image_digest_ref }}
        run: |
          set -euo pipefail
          mkdir -p attestations

          if ! docker buildx imagetools inspect "${IMAGE_DIGEST_REF}" --format '{{ json (index .Provenance "linux/amd64").SLSA }}' > attestations/provenance.buildkit.json 2>/dev/null; then
            docker buildx imagetools inspect "${IMAGE_DIGEST_REF}" --format '{{ json .Provenance.SLSA }}' > attestations/provenance.buildkit.json
          fi

          if ! docker buildx imagetools inspect "${IMAGE_DIGEST_REF}" --format '{{ json (index .SBOM "linux/amd64").SPDX }}' > attestations/sbom.buildkit.spdx.json 2>/dev/null; then
            docker buildx imagetools inspect "${IMAGE_DIGEST_REF}" --format '{{ json .SBOM.SPDX }}' > attestations/sbom.buildkit.spdx.json
          fi

          jq -e 'type == "object" and length > 0' attestations/provenance.buildkit.json >/dev/null
          jq -e 'type == "object" and length > 0' attestations/sbom.buildkit.spdx.json >/dev/null

      - name: Detect provenance predicate type
        run: |
          set -euo pipefail
          PROVENANCE_PREDICATE_TYPE=$(jq -r '
            if has("buildDefinition") and has("runDetails") then "https://slsa.dev/provenance/v1"
            elif has("builder") and has("buildType") then "https://slsa.dev/provenance/v0.2"
            else ""
            end
          ' attestations/provenance.buildkit.json)

          if [ -z "${PROVENANCE_PREDICATE_TYPE}" ]; then
            echo "Unsupported BuildKit provenance predicate shape:" >&2
            jq -r 'keys_unsorted | @json' attestations/provenance.buildkit.json >&2
            exit 1
          fi

          echo "Detected provenance predicate type: ${PROVENANCE_PREDICATE_TYPE}"
          echo "PROVENANCE_PREDICATE_TYPE=${PROVENANCE_PREDICATE_TYPE}" >> "$GITHUB_ENV"

      - name: Verify BuildKit OCI attestations are attached
        env:
          IMAGE_DIGEST_REF: ${{ steps.refs.outputs.image_digest_ref }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${IMAGE_DIGEST_REF}" --raw > attestations/image-index.raw.json
          jq -e '.manifests | map(select(.annotations["vnd.docker.reference.type"] == "attestation-manifest")) | length > 0' attestations/image-index.raw.json >/dev/null

      - name: Create Cosign attestations from BuildKit predicates
        env:
          IMAGE_DIGEST_REF: ${{ steps.refs.outputs.image_digest_ref }}
        run: |
          set -euo pipefail
          cosign attest --yes \
            --type "${PROVENANCE_PREDICATE_TYPE}" \
            --predicate attestations/provenance.buildkit.json \
            "${IMAGE_DIGEST_REF}"
          cosign attest --yes \
            --type https://spdx.dev/Document \
            --predicate attestations/sbom.buildkit.spdx.json \
            "${IMAGE_DIGEST_REF}"

      - name: Verify signature and Cosign attestations
        env:
          IMAGE_DIGEST_REF: ${{ steps.refs.outputs.image_digest_ref }}
          COSIGN_CERT_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/docker-release-ui.yml@refs/tags/${{ github.ref_name }}
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-identity "${COSIGN_CERT_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_DIGEST_REF}"
          cosign verify-attestation \
            --type "${PROVENANCE_PREDICATE_TYPE}" \
            --certificate-identity "${COSIGN_CERT_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_DIGEST_REF}" > /tmp/provenance.jsonl
          test -s /tmp/provenance.jsonl
          cosign verify-attestation \
            --type "https://spdx.dev/Document" \
            --certificate-identity "${COSIGN_CERT_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_DIGEST_REF}" > /tmp/sbom-attestation.jsonl
          test -s /tmp/sbom-attestation.jsonl

      - name: Export SPDX and CycloneDX SBOM files
        env:
          IMAGE_DIGEST_REF: ${{ steps.refs.outputs.image_digest_ref }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          syft "${IMAGE_DIGEST_REF}" -o "spdx-json=release-assets/aas-gui-${{ steps.meta.outputs.version }}.spdx.json"
          syft "${IMAGE_DIGEST_REF}" -o "cyclonedx-json=release-assets/aas-gui-${{ steps.meta.outputs.version }}.cdx.json"

      - name: Write release metadata
        run: |
          set -euo pipefail
          jq -n \
            --arg image "${{ env.IMAGE_NAME }}" \
            --arg version "${{ steps.meta.outputs.version }}" \
            --arg digest "${{ steps.build.outputs.digest }}" \
            --arg tags "${{ steps.meta.outputs.tags }}" \
            --arg imageDigestRef "${{ steps.refs.outputs.image_digest_ref }}" \
            --arg signatureIdentity "https://github.com/${{ github.repository }}/.github/workflows/docker-release-ui.yml@refs/tags/${{ github.ref_name }}" \
            --arg spdx "aas-gui-${{ steps.meta.outputs.version }}.spdx.json" \
            --arg cyclonedx "aas-gui-${{ steps.meta.outputs.version }}.cdx.json" \
            '{
              image: $image,
              version: $version,
              digest: $digest,
              tags: ($tags | split(",")),
              imageDigestRef: $imageDigestRef,
              signatureIdentity: $signatureIdentity,
              buildkitAttestations: {
                provenance: true,
                sbom: true
              },
              cosignAttestations: {
                provenance: true,
                sbom: true
              },
              sbomFiles: {
                spdxJson: $spdx,
                cyclonedxJson: $cyclonedx
              }
            }' > release-assets/release-image-metadata.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-sbom
          path: release-assets/*
          retention-days: 30

      - name: Verify Docker Images
        run: |
          set -euo pipefail
          docker pull ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          docker pull ${{ env.IMAGE_NAME }}:latest

  attach-release-assets:
    needs: [guard, build-and-push-release]
    if: ${{ needs.guard.outputs.should-run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Download release SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-sbom
          path: release-assets

      - name: Generate release supply-chain manifest
        run: |
          set -euo pipefail
          jq -s \
            --arg release "${{ github.ref_name }}" \
            --arg generatedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              release: $release,
              generatedAt: $generatedAt,
              images: .
            }' release-assets/release-image-metadata.json > release-assets/release-supply-chain-manifest.json

      - name: Attach SBOM assets to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            release-assets/*.spdx.json
            release-assets/*.cdx.json
            release-assets/release-image-metadata.json
            release-assets/release-supply-chain-manifest.json
