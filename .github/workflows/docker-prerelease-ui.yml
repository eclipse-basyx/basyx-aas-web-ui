name: Build and Push Docker Images on PR Merge

on:
  push:
    branches:
      - main
    paths:
      - "aas-web-ui/**"
      - ".github/workflows/docker-prerelease-ui.yml"
      - ".github/workflows/docker-release-ui.yml"

concurrency:
  group: docker-prerelease-ui-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        run: |
          if [[ "${GITHUB_REPOSITORY}" == "eclipse-basyx/basyx-aas-web-ui" && "${GITHUB_EVENT_REPOSITORY_FORK}" != "true" ]]; then
            echo "✅ Running in upstream repository"
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          else
            echo "⏭️ Skipping build — fork detected (${GITHUB_REPOSITORY})"
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push-prerelease:
    needs: guard
    if: ${{ needs.guard.outputs.should-run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
    outputs:
      image_digest_ref: ${{ steps.refs.outputs.image_digest_ref }}
      version: ${{ steps.meta.outputs.version }}

    env:
      IMAGE_NAME: eclipsebasyx/aas-gui

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.4.1

      - name: Install Syft
        run: |
          set -euo pipefail
          SYFT_VERSION=1.29.1
          ARCHIVE="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl -fsSLO "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/${ARCHIVE}"
          curl -fsSLO "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_checksums.txt"
          curl -fsSLO "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_checksums.txt.sig"
          curl -fsSLO "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_checksums.txt.pem"

          cosign verify-blob \
            --certificate "syft_${SYFT_VERSION}_checksums.txt.pem" \
            --signature "syft_${SYFT_VERSION}_checksums.txt.sig" \
            --certificate-identity-regexp '^https://github\.com/anchore/syft/\.github/workflows/.*@refs/tags/v.*$' \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "syft_${SYFT_VERSION}_checksums.txt"

          grep " ${ARCHIVE}$" "syft_${SYFT_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "${ARCHIVE}" syft
          sudo install -m 0755 syft /usr/local/bin/syft
          syft version

      - name: Generate version metadata
        id: meta
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          VERSION="SNAPSHOT-${TIMESTAMP}-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Building snapshot version: ${VERSION}"

      - name: Build and Push Docker Image (Pre-release)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./aas-web-ui
          file: ./aas-web-ui/Dockerfile
          pull: true
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            VITE_APP_VERSION=${{ steps.meta.outputs.version }}
            VITE_APP_COMMIT_SHA=${{ github.sha }}
            VITE_APP_BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE_NAME }}:SNAPSHOT
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=BaSyx AAS Web UI
            org.opencontainers.image.description=Eclipse BaSyx Asset Administration Shell Web UI
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=Eclipse BaSyx
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/README.md
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Compute image references
        id: refs
        run: |
          set -euo pipefail
          echo "image_digest_ref=${IMAGE_NAME}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Sign image digest (keyless)
        env:
          IMAGE_DIGEST_REF: ${{ steps.refs.outputs.image_digest_ref }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE_DIGEST_REF}"

      - name: Extract BuildKit provenance and SBOM predicates
        env:
          IMAGE_DIGEST_REF: ${{ steps.refs.outputs.image_digest_ref }}
        run: |
          set -euo pipefail
          mkdir -p predicates

          if ! docker buildx imagetools inspect "${IMAGE_DIGEST_REF}" --format '{{ json (index .Provenance "linux/amd64").SLSA }}' > predicates/provenance.buildkit.json 2>/dev/null; then
            docker buildx imagetools inspect "${IMAGE_DIGEST_REF}" --format '{{ json .Provenance.SLSA }}' > predicates/provenance.buildkit.json
          fi

          if ! docker buildx imagetools inspect "${IMAGE_DIGEST_REF}" --format '{{ json (index .SBOM "linux/amd64").SPDX }}' > predicates/sbom.buildkit.spdx.json 2>/dev/null; then
            docker buildx imagetools inspect "${IMAGE_DIGEST_REF}" --format '{{ json .SBOM.SPDX }}' > predicates/sbom.buildkit.spdx.json
          fi

          jq -e 'type == "object" and length > 0' predicates/provenance.buildkit.json >/dev/null
          jq -e 'type == "object" and length > 0' predicates/sbom.buildkit.spdx.json >/dev/null

      - name: Detect provenance predicate type
        run: |
          set -euo pipefail
          PROVENANCE_PREDICATE_TYPE=$(jq -r '
            if has("buildDefinition") and has("runDetails") then "https://slsa.dev/provenance/v1"
            elif has("builder") and has("buildType") then "https://slsa.dev/provenance/v0.2"
            else ""
            end
          ' predicates/provenance.buildkit.json)

          if [ -z "${PROVENANCE_PREDICATE_TYPE}" ]; then
            echo "Unsupported BuildKit provenance predicate shape:" >&2
            jq -r 'keys_unsorted | @json' predicates/provenance.buildkit.json >&2
            exit 1
          fi

          echo "Detected provenance predicate type: ${PROVENANCE_PREDICATE_TYPE}"
          echo "PROVENANCE_PREDICATE_TYPE=${PROVENANCE_PREDICATE_TYPE}" >> "$GITHUB_ENV"

      - name: Verify BuildKit OCI attestation manifests exist
        env:
          IMAGE_DIGEST_REF: ${{ steps.refs.outputs.image_digest_ref }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${IMAGE_DIGEST_REF}" --raw > /tmp/image-index.json
          jq -e '.manifests | map(select(.annotations["vnd.docker.reference.type"] == "attestation-manifest")) | length > 0' /tmp/image-index.json >/dev/null

      - name: Create Cosign attestations from BuildKit predicates
        env:
          IMAGE_DIGEST_REF: ${{ steps.refs.outputs.image_digest_ref }}
        run: |
          set -euo pipefail
          cosign attest --yes \
            --type "${PROVENANCE_PREDICATE_TYPE}" \
            --predicate predicates/provenance.buildkit.json \
            "${IMAGE_DIGEST_REF}"
          cosign attest --yes \
            --type https://spdx.dev/Document \
            --predicate predicates/sbom.buildkit.spdx.json \
            "${IMAGE_DIGEST_REF}"

      - name: Verify signature and Cosign attestations
        env:
          IMAGE_DIGEST_REF: ${{ steps.refs.outputs.image_digest_ref }}
          COSIGN_CERT_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/docker-prerelease-ui.yml@refs/heads/main
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-identity "${COSIGN_CERT_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_DIGEST_REF}"
          cosign verify-attestation \
            --type "${PROVENANCE_PREDICATE_TYPE}" \
            --certificate-identity "${COSIGN_CERT_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_DIGEST_REF}" > /tmp/provenance.jsonl
          test -s /tmp/provenance.jsonl
          cosign verify-attestation \
            --type "https://spdx.dev/Document" \
            --certificate-identity "${COSIGN_CERT_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_DIGEST_REF}" > /tmp/sbom-attestation.jsonl
          test -s /tmp/sbom-attestation.jsonl

      - name: Export SPDX and CycloneDX SBOM files
        env:
          IMAGE_DIGEST_REF: ${{ steps.refs.outputs.image_digest_ref }}
        run: |
          set -euo pipefail
          mkdir -p snapshot-sbom
          syft "${IMAGE_DIGEST_REF}" -o "spdx-json=snapshot-sbom/aas-gui-${{ steps.meta.outputs.version }}.spdx.json"
          syft "${IMAGE_DIGEST_REF}" -o "cyclonedx-json=snapshot-sbom/aas-gui-${{ steps.meta.outputs.version }}.cdx.json"

      - name: Upload snapshot SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snapshot-sbom-${{ steps.meta.outputs.version }}
          path: snapshot-sbom/*
          retention-days: 14

      - name: Verify Docker image tags
        run: |
          set -euo pipefail
          docker pull ${{ env.IMAGE_NAME }}:SNAPSHOT
          docker pull ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          docker pull ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}

      - name: Image digest
        run: |
          echo "Built and pushed ${{ env.IMAGE_NAME }}:SNAPSHOT"
          echo "Built and pushed immutable tags ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} and ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
