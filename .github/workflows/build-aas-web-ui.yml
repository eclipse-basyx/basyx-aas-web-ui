name: Build AAS Web UI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'aas-web-ui/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'pnpm'
        cache-dependency-path: 'aas-web-ui/pnpm-lock.yaml'

    - name: Install Dependencies
      run: |
        cd aas-web-ui
        pnpm install --frozen-lockfile

    - name: Build (with lint/tests/type-check)
      run: |
        cd aas-web-ui
        pnpm build
