pid /tmp/nginx.pid;
events {}
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    types {
        application/javascript                js mjs;
    }
    
    server {
        listen 3000;
        location ${BASE_PATH_NGINX_PREFIX}/api/catena-x/edc/ {
            proxy_pass ${CX_EDC_BFF_UPSTREAM_URL}/api/catena-x/edc/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location ${BASE_PATH_NGINX_PREFIX}/ {
            alias /usr/src/app/dist/;
            try_files $uri $uri/ ${BASE_PATH_NGINX_PREFIX}/index.html;
        }
    }
}
