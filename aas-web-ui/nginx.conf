pid /tmp/nginx.pid;
events {}
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    resolver 127.0.0.11 valid=30s ipv6=off;

    types {
        application/javascript                mjs;
    }
    
    server {
        listen 3000;
        set $cx_edc_bff_upstream "${CX_EDC_BFF_UPSTREAM_URL}";

        location ${BASE_PATH_NGINX_PREFIX}/api/catena-x/edc/ {
            rewrite ^${BASE_PATH_NGINX_PREFIX}(/api/catena-x/edc/.*)$ $1 break;
            proxy_pass $cx_edc_bff_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location ${BASE_PATH_NGINX_PREFIX}/ {
            alias /usr/src/app/dist/;
            try_files $uri $uri/ ${BASE_PATH_NGINX_PREFIX}/index.html;
        }
    }
}
