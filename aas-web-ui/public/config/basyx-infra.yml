# BaSyx Infrastructure Configuration
#
# This file allows system administrators to preconfigure multiple BaSyx infrastructures.
# Place this file at:
# - Development: /aas-web-ui/public/config/basyx-infra.yml
# - Production (Docker): Mount to /basyx-infra.yml
#
# The configuration will be loaded at application startup and merged with user settings.
# When VITE_ENDPOINT_CONFIG_AVAILABLE=false, this configuration takes full precedence.
# When VITE_ENDPOINT_CONFIG_AVAILABLE=true, users can edit these infrastructures.
# Optional component flags:
# - hasRegistryIntegration: Backend repository creates/updates/deletes descriptors automatically.
# - hasDiscoveryIntegration: Backend AAS registry creates/updates/deletes discovery asset links automatically.
# Optional infrastructure template (defaults to "full" when omitted):
# - full: aasDiscovery, aasRegistry, submodelRegistry, aasRepository, submodelRepository, conceptDescriptionRepository, companyLookup
# - identifiable: aasRepository only; submodels are resolved via /shells/{aasId}/submodels/{submodelId}
# - mono-repo: discovery and registries plus one aasEnvironment URL for the repositories
# - mono-all: one aasEnvironment URL for all components
# - catena-x: direct digitalTwinRegistry plus submodelService, or EDC proxy access
# Optional Catena-X EDC metadata:
# - catenaX.accessMode can be "direct" or "edc"; older configs infer "edc" when proxyId is set.
# - catenaX.edc.proxyId links this infrastructure to a server-side EDC BFF proxy config.
# - catenaX.edc.partners can preconfigure known counterparties; users may still enter runtime partners.
# - Do not put the EDC Management API URL or x-api-key in this YAML file.

infrastructures:
  # Specify which infrastructure should be selected by default
  default: local

  # Local development infrastructure (no authentication)
  local:
    name: Local BaSyx
    template: full
    components:
      aasDiscovery:
        baseUrl: "http://localhost:9084"
      aasRegistry:
        baseUrl: "http://localhost:9082"
        hasDiscoveryIntegration: true
      submodelRegistry:
        baseUrl: "http://localhost:9083"
      aasRepository:
        baseUrl: "http://localhost:9081"
        hasRegistryIntegration: true
      submodelRepository:
        baseUrl: "http://localhost:9081"
        hasRegistryIntegration: true
      conceptDescriptionRepository:
        baseUrl: "http://localhost:9081"
      companyLookup:
        baseUrl: "http://localhost:5080"
    security:
      type: none

