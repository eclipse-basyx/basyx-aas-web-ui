infrastructures:
  default: infra1

  infra1:
    name: Secured BaSyx
    template: mono-all
    components:
      aasEnvironment:
        baseUrl: "http://localhost:8081"
    security:
      type: oauth2
      config:
        flow: auth_code
        issuer: "http://keycloak.localhost:8080/realms/BaSyx"
        clientId: "basyx-web-ui"

  infra2:
    name: Local BaSyx
    template: mono-all
    components:
      aasEnvironment:
        baseUrl: "http://localhost:9081"
    security:
      type: none
